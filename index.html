<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kutup Temalı Fabl Yazma Kılavuzu</title>
  <style>
    :root{
      --bg:#edf2f7;
      --bg-2:#f7fafc;
      --glass:rgba(255,255,255,.72);
      --glass-strong:rgba(255,255,255,.86);
      --text:#16202a;
      --muted:#5e6b78;
      --accent:#ff7a18;
      --accent-2:#ff9b52;
      --blue:#4c7dff;
      --blue-2:#7fa7ff;
      --line:rgba(54,78,110,.18);
      --shadow:0 10px 30px rgba(40,56,85,.10);
      --shadow-soft:0 6px 18px rgba(40,56,85,.08);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(76,125,255,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(255,122,24,.12), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
    }

    .app{
      max-width:980px;
      margin:0 auto;
      padding:12px;
    }

    .shell{
      position:relative;
      overflow:hidden;
      background:var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,.55);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:12px;
    }

    .snow-layer{
      pointer-events:none;
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:0;
    }

    .snowflake{
      position:absolute;
      top:-20px;
      color:rgba(255,255,255,.75);
      font-size:10px;
      animation:fall linear infinite;
      text-shadow:0 0 8px rgba(255,255,255,.35);
      opacity:.8;
    }

    @keyframes fall{
      0%{ transform:translateY(-10px) translateX(0); opacity:0; }
      10%{ opacity:.8; }
      100%{ transform:translateY(560px) translateX(16px); opacity:.15; }
    }

    .title{
      position:relative;
      z-index:1;
      overflow:hidden;
      background:linear-gradient(135deg, #ff7a18 0%, #ff8d35 55%, #ffb067 100%);
      color:#fff;
      border-radius:24px;
      text-align:center;
      font-size:1.38rem;
      font-weight:800;
      letter-spacing:.2px;
      padding:14px 12px;
      box-shadow:0 12px 28px rgba(255,122,24,.22);
    }

    .title::after{
      content:"";
      position:absolute;
      inset:auto -20% -55% auto;
      width:180px;
      height:180px;
      background:rgba(255,255,255,.16);
      border-radius:50%;
      filter:blur(1px);
    }

    .hero{
      position:relative;
      z-index:1;
      margin-top:10px;
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .speech{
      position:relative;
      background:var(--glass-strong);
      border:1px solid var(--line);
      border-radius:22px;
      min-height:72px;
      display:flex;
      align-items:center;
      padding:12px 14px;
      font-size:.8rem;
      line-height:1.45;
      box-shadow:var(--shadow-soft);
    }

    .speech strong{
      display:inline-block;
      font-size:.92rem;
      margin-bottom:2px;
    }

    .speech::before{
      content:"";
      position:absolute;
      left:-18px;
      bottom:18px;
      width:28px;
      height:28px;
      background:var(--glass-strong);
      border-left:1px solid var(--line);
      border-bottom:1px solid var(--line);
      transform:rotate(45deg);
      border-bottom-left-radius:6px;
    }

    .grid{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:10px 6px 6px;
    }

    .topic-btn{
      position:relative;
      width:100%;
      min-height:44px;
      border:none;
      border-radius:15px;
      background:linear-gradient(180deg, rgba(255,255,255,.95) 0%, rgba(241,245,251,.95) 100%);
      color:var(--text);
      font-size:.76rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:var(--shadow-soft);
      padding:8px 12px;
      transition:transform .14s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
      border:1px solid rgba(76,125,255,.10);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .topic-btn::after{
      content:"";
      position:absolute;
      inset:-30% auto -30% -120%;
      width:58%;
      transform:skewX(-22deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.78), transparent);
      transition:left .55s ease;
      pointer-events:none;
    }

    .topic-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(76,125,255,.12), 0 0 0 1px rgba(127,167,255,.18), 0 0 18px rgba(127,167,255,.18);
    }

    .topic-btn:hover::after{
      left:140%;
    }

    .topic-btn.active{
      background:linear-gradient(135deg, #4c7dff 0%, #6c94ff 100%);
      color:#fff;
      box-shadow:0 12px 26px rgba(76,125,255,.24);
      border-color:transparent;
    }

    .result-box{
      position:relative;
      z-index:1;
      margin-top:8px;
      background:linear-gradient(180deg, rgba(255,255,255,.9) 0%, rgba(245,248,252,.94) 100%);
      border:1px solid var(--line);
      border-radius:20px;
      padding:12px 14px;
      min-height:120px;
      box-shadow:var(--shadow-soft);
      font-size:.79rem;
      line-height:1.45;
    }

    .result-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .result-box h3{
      margin:0;
      font-size:.94rem;
      color:#214d9a;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .badge{
      background:rgba(76,125,255,.10);
      color:#2f63d6;
      border:1px solid rgba(76,125,255,.14);
      border-radius:999px;
      padding:5px 10px;
      font-size:.67rem;
      font-weight:700;
      white-space:nowrap;
    }

    .mini-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin:8px 0;
    }

    .mini-card{
      background:rgba(255,255,255,.78);
      border:1px solid rgba(54,78,110,.10);
      border-radius:14px;
      padding:8px 10px;
    }

    .mini-card .label{
      display:block;
      font-size:.64rem;
      font-weight:800;
      color:var(--muted);
      margin-bottom:4px;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .quote{
      margin:8px 0;
      padding:8px 10px;
      border-radius:14px;
      background:linear-gradient(90deg, rgba(255,122,24,.08), rgba(255,255,255,.7));
      border-left:3px solid var(--accent);
      color:#4a5562;
      font-style:italic;
    }

    .suggestion{
      color:#25323f;
    }

    .bottom{
      position:relative;
      z-index:1;
      display:block;
      margin-top:10px;
    }

    .input-box{
      background:rgba(255,255,255,.82);
      border:1px solid var(--line);
      border-radius:16px;
      min-height:48px;
      box-shadow:var(--shadow-soft);
      display:flex;
      align-items:center;
      padding:8px 10px;
    }

    textarea{
      width:100%;
      min-height:26px;
      resize:none;
      border:none;
      outline:none;
      background:transparent;
      font-size:.78rem;
      font-family:inherit;
      color:var(--text);
    }

    textarea::placeholder{ color:#7c8792; }

    

    .note{
      position:relative;
      z-index:1;
      padding:6px 4px 0;
      font-size:.67rem;
      color:#5f6b77;
      text-align:center;
    }

    .btn-icon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:28px;
      height:28px;
      flex:0 0 28px;
      border-radius:10px;
      background:rgba(255,255,255,.78);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 2px 6px rgba(76,125,255,.10);
    }

    .btn-icon svg{
      width:22px;
      height:22px;
      display:block;
    }

    @media (max-width:700px){
      .app{ padding:8px; }
      .shell{ padding:10px; border-radius:24px; }
      .title{ font-size:1.1rem; padding:12px 10px; }
      .grid{ grid-template-columns:1fr; }
      .speech{ font-size:.74rem; }
      .speech::before{ display:none; }
      .mini-grid{ grid-template-columns:1fr; }
      .topic-btn{ min-height:40px; }
      .btn-icon{ width:26px; height:26px; flex-basis:26px; }
      .btn-icon svg{ width:20px; height:20px; }
    }

    @media (max-width:520px){
      .title{ font-size:1rem; }
    }
  </style>
</head>

      }
    };

    const animalHints = {
      "beyaz tilki": "besin yönetimi ve sabır",
      "arktik tilkisi": "besin yönetimi ve sabır",
      "kar baykuşu": "yön bulma ve alan okuma",
      "kutup ayısı": "sessizlik ve enerji yönetimi",
      "kutup kurdu": "topluluk ve iş birliği",
      "kutup tavşanı": "riskten kaçınma ve çekilme",
      "arktik tavşanı": "riskten kaçınma ve çekilme",
      "kutup sumrusu": "göç ve hareket",
      "fok": "riskten kaçınma ve çekilme",
      "misk öküzü": "topluluk ve iş birliği",
      "mors": "yön bulma ve alan okuma",
      "narval": "göç ve hareket",
      "pufla": "topluluk ve iş birliği",
      "ren geyiği": "göç ve hareket"
    };

    const aliases = {
      "sabır ve enerji yönetimi": "sessizlik ve enerji yönetimi",
      "enerji yönetimi": "sessizlik ve enerji yönetimi",
      "sabır": "besin yönetimi ve sabır",
      "iş birliği": "topluluk ve iş birliği",
      "topluluk": "topluluk ve iş birliği",
      "göç": "göç ve hareket",
      "hareket": "göç ve hareket",
      "risk": "riskten kaçınma ve çekilme",
      "çekilme": "riskten kaçınma ve çekilme",
      "yön bulma": "yön bulma ve alan okuma",
      "alan okuma": "yön bulma ve alan okuma"
    };

    const buttons = [...document.querySelectorAll('.topic-btn')];
    const resultBox = document.getElementById('resultBox');
    const extraNote = document.getElementById('extraNote');
    const userInput = document.getElementById('userInput');
        const snowLayer = document.getElementById('snowLayer');

    function normalize(text){
      return text.toLowerCase()
        .replace(/ı/g,'i')
        .replace(/ğ/g,'g')
        .replace(/ü/g,'u')
        .replace(/ş/g,'s')
        .replace(/ö/g,'o')
        .replace(/ç/g,'c')
        .trim();
    }

    function setActive(topic){
      buttons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.topic === topic);
      });
    }

    function renderTopic(topic){
      const item = guideData[topic];
      if(!item) return;

      resultBox.innerHTML = `
        <div class="result-head">
          <h3>${item.icon} ${item.title}</h3>
          <div class="badge">Fabl Teması</div>
        </div>
        <div class="mini-grid">
          <div class="mini-card">
            <span class="label">Önerilen Karakterler</span>
            ${item.characters}
          </div>
          <div class="mini-card">
            <span class="label">Temel Kavramlar</span>
            ${item.concepts}
          </div>
        </div>
        <div class="quote">"${item.quote}"</div>
        <div class="suggestion"><strong>Yazım Önerisi:</strong> ${item.suggestion}</div>
      `;

      setActive(topic);
    }

    function findTopicFromText(text){
      const n = normalize(text);

      for(const key in guideData){
        if(n.includes(normalize(key))) return key;
      }

      for(const key in aliases){
        if(n.includes(normalize(key))) return aliases[key];
      }

      for(const animal in animalHints){
        if(n.includes(normalize(animal))) return animalHints[animal];
      }

      return null;
    }

    function handleInput(){
      const text = userInput.value.trim();

      if(!text){
        extraNote.textContent = "Bir tema ya da hayvan adı yazabilirsin: kutup ayısı, beyaz tilki, göç, iş birliği, risk...";
        return;
      }

      const matched = findTopicFromText(text);

      if(matched){
        renderTopic(matched);
        extraNote.textContent = "Tema güncellendi.";
        userInput.value = "";
        return;
      }

      const n = normalize(text);
      if(n.includes('liste') || n.includes('tema')){
        extraNote.textContent = "Kullanılabilir temalar: yön bulma, iş birliği, besin yönetimi, göç, sessizlik, riskten kaçınma.";
        userInput.value = "";
        return;
      }

      extraNote.textContent = "Tanınan bir tema bulunamadı. Örnek: göç, iş birliği, kutup ayısı, risk.";
      userInput.value = "";
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        renderTopic(btn.dataset.topic);
        extraNote.textContent = "Tema güncellendi.";
      });
    });

        userInput.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        handleInput();
      }
    });

    userInput.addEventListener('input', () => {
      const value = userInput.value.trim();
      if(!value){
        extraNote.textContent = "Tema ya da hayvan adı yazabilirsin: kutup ayısı, beyaz tilki, göç, iş birliği, risk...";
        return;
      }
      const matched = findTopicFromText(value);
      if(matched){
        renderTopic(matched);
        extraNote.textContent = "Tema otomatik güncellendi.";
      }
    });

    const snowSymbols = ['❄','✦','•'];
    for(let i = 0; i < 22; i++){
      const flake = document.createElement('span');
      flake.className = 'snowflake';
      flake.textContent = snowSymbols[i % snowSymbols.length];
      flake.style.left = Math.random() * 100 + '%';
      flake.style.animationDuration = (8 + Math.random() * 8) + 's';
      flake.style.animationDelay = (Math.random() * 8) + 's';
      flake.style.fontSize = (8 + Math.random() * 8) + 'px';
      snowLayer.appendChild(flake);
    }

    renderTopic('sessizlik ve enerji yönetimi');
  </script>
</body>
</html>
